name: CI to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Action lấy code từ Github (Checkout)
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. Action Đăng nhập Docker Hub (Docker Login)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Action Đóng gói & Đẩy Image (Build and push Docker images)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: tranducminh1502/btdocker:v1
